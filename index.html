<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VogueNest - Fashion Online Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YC8MGL21LM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YC8MGL21LM');
</script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
header { background:black; color:white; padding:20px; text-align:center; }
.products { display:flex; gap:20px; justify-content:center; padding:40px; flex-wrap:wrap; }
.product { background:white; padding:20px; width:250px; text-align:center; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
.product img { width:100%; }
button { background:black; color:white; padding:10px; border:none; cursor:pointer; }
</style>
</head>

<body>

<header>
<h1>VogueNest</h1>
<p>Elevate Your Style</p>
</header>

<section class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
<h3 onclick="viewItem('SKU_101','Floral Summer Dress',2499)">Floral Summer Dress</h3>
<p>₹2,499</p>
<button onclick="addToCart('SKU_101','Floral Summer Dress',2499)">
Add to Cart
</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
<h3 onclick="viewItem('SKU_102','Classic Denim Jacket',3299)">Classic Denim Jacket</h3>
<p>₹3,299</p>
<button onclick="addToCart('SKU_102','Classic Denim Jacket',3299)">
Add to Cart
</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<h3 onclick="viewItem('SKU_103','Luxury Handbag',4999)">Luxury Handbag</h3>
<p>₹4,999</p>
<button onclick="addToCart('SKU_103','Luxury Handbag',4999)">
Add to Cart
</button>
</div>

</section>

<script>
function viewItem(id, name, price) {
gtag('event', 'view_item', {
  currency: 'INR',
  value: price,
  items: [{
    item_id: id,
    item_name: name,
    price: price
  }]
});
alert(name + " viewed");
}

function addToCart(id, name, price) {
gtag('event', 'add_to_cart', {
  currency: 'INR',
  value: price,
  items: [{
    item_id: id,
    item_name: name,
    price: price
  }]
});
alert(name + " added to cart");
}
</script>

</body>
</html>
