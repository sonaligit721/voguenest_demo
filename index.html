<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VogueNest - Fashion Online Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Analytics (Replace G-XXXXXXXXXX with your ID) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
        }
        header {
            background-color: black;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #222;
            text-align: center;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: url('https://images.unsplash.com/photo-1521334884684-d80222895322') no-repeat center center/cover;
            color: white;
        }
        .hero h1 {
            font-size: 48px;
        }
        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }
        .product {
            background: white;
            padding: 20px;
            width: 250px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
        }
        button {
            background-color: black;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: black;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>VogueNest</h1>
    <p>Elevate Your Style</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Women</a>
    <a href="#">Men</a>
    <a href="#">Accessories</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>New Summer Collection</h1>
    <p>Trendy. Elegant. Affordable.</p>
    <button onclick="alert('Added to Wishlist!')">Shop Now</button>
</section>

<section class="products">
    <div class="product">
        <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d" alt="Dress">
        <h3>Floral Summer Dress</h3>
        <p>₹2,499</p>
        <button onclick="alert('Product Added to Cart')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="Jacket">
        <h3>Classic Denim Jacket</h3>
        <p>₹3,299</p>
        <button onclick="alert('Product Added to Cart')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="Bag">
        <h3>Luxury Handbag</h3>
        <p>₹4,999</p>
        <button onclick="alert('Product Added to Cart')">Add to Cart</button>
    </div>
</section>

<footer>
    © 2026 VogueNest | Designed for Learning Google Analytics Demo
</footer>

</body>
</html>
